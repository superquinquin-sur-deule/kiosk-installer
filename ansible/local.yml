---
- name: Configure kiosk
  hosts: all
  become: true

  roles:
    - { role: installer, tags: [system, installer] }
    - { role: system, tags: [system] }
    - { role: kiosk, tags: [apps, kiosk] }

- name: Configure POS
  hosts: caisses
  become: true

  roles:
    - { role: kiosk-auth, tags: [apps, auth] }
    - { role: kiosk-posbox, tags: [apps, posbox] }

- name: Configure accueil
  hosts: accueil
  become: true

  roles:
    - { role: node-exporter, tags: [apps, node-exporter] }
