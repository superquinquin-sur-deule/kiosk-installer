---
- name: Set hostname from machine-id
  ansible.builtin.hostname:
    name: "kiosk-{{ ansible_machine_id[:6] }}"

- name: Synchronize /etc/hosts with new hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1\t{{ ansible_hostname }}"
    state: present

- name: Deploy MOTD
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
