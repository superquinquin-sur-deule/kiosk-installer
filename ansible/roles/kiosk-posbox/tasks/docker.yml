---
- name: Install required dependencies
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - python3-requests
    state: present

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_gpg_url }}"
    dest: "{{ docker_keyring_path }}"
    mode: 0644

- name: Add Docker repository to sources.list.d
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: {{ docker_url }}
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Architectures: {{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}
      Signed-By: {{ docker_keyring_path }}

- name: Update apt package index
  ansible.builtin.apt:
    update_cache: yes

- name: Install Docker and plugins
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started
