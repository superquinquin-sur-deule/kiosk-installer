name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y xorriso cpio

      - name: Cache base ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: debian-13.4.0-amd64-netinst.iso
          key: debian-13.4.0-amd64-netinst.iso

      - name: Download base ISO
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          wget -q https://cdimage.debian.org/debian-cd/current/amd64/iso-cd/debian-13.4.0-amd64-netinst.iso

      - name: Build preseeded ISO
        run: make VERSION=v${{ inputs.version }} preseed-debian-13.4.0-amd64-netinst.iso

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            preseed-debian-13.4.0-amd64-netinst.iso
