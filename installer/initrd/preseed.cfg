#_preseed_V1

#
# B.4. Contents of the preconfiguration file
# Source : https://www.debian.org/releases/stable/amd64/apbs04.en.html
#

###
### B.4.1. Localization
###

d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string FR

d-i keyboard-configuration/xkb-keymap select fr(latin9)
d-i keyboard-configuration/keymap select fr(latin9)

###
### B.4.3. Network configuration
###

d-i netcfg/wireless_wep string

###
### B.4.5. Mirror settings
###

d-i mirror/http/hostname string ftp.fr.debian.org

###
### B.4.6. Account setup
###

d-i passwd/root-login boolean false
d-i passwd/username string ansible
d-i passwd/user-uid string 1001
d-i passwd/user-fullname string ansible
d-i passwd/user-password-crypted password !

###
### B.4.7. Clock and time zone setup
###

d-i time/zone string Europe/Paris

###
### B.4.8. Partitioning
###

d-i partman/early_command string \
    DEVICE=$(list-devices disk | head -n1); \
    debconf-set partman-auto/disk "$DEVICE"; \
    debconf-set grub-installer/bootdev "$DEVICE"

d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select custom
d-i partman-auto/expert_recipe_file string /cdrom/recipes/custom
d-i partman-basicfilesystems/no_mount_point boolean false
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

###
### B.4.9. Base system installation
###

d-i base-installer/install-recommends boolean false

###
### B.4.10. Apt setup
###

d-i apt-setup/services-select multiselect security, updates, release updates

###
### B.4.11. Package selection
###

d-i pkgsel/run_tasksel boolean false
d-i pkgsel/include string openssh-server default-dbus-session-bus systemd-resolved git ansible fontconfig plymouth

###
### B.4.12. Boot loader installation
###

d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

###
### B.4.13 Finishing up the installation
###

d-i finish-install/reboot_in_progress note

#
# B.5. Advanced options
# Source : https://www.debian.org/releases/stable/amd64/apbs05.en.html
#

###
### B.5.1 Running custom commands during the installation
###

d-i preseed/late_command string sh /cdrom/post-install.sh
